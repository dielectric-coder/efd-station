# efd-station backend configuration
# Place at ~/.config/efd-backend/config.toml

[server]
bind = "0.0.0.0"
port = 8080

[usb]
# vendor_id = 0x1721
# product_id = 0x061a

[dsp]
fft_size = 4096
fft_averaging = 3
sample_rate = 192000

[cat]
# "auto" discovers the FDM-DUO CAT serial port automatically
# or an explicit path like "/dev/ttyUSB0"
serial_device = "auto"
poll_interval_ms = 200

[audio]
alsa_device = "default"
sample_rate = 48000
